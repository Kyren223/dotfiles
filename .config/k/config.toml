[development]
rebuild_before_running = true
enable_rebuild_indicator = true

[workspace]
paths = ["$HOME/projects", "$HOME/personal", "$HOME/Documents", "$HOME/"]

[memories]
path = "$HOME/personal/grimoire/memories/"

[system]
rpms_path = "$HOME/rpms"
packages = '''
keepassxc
git
stow
delta
nix
dnf-command(versionlock)
zsh
oh-my-posh
keychain
fzf
zoxide
ghostty
eza
golang
gcc clang lld mold gdb lldb
tmux
tree-sitter-cli
fastfetch
find
fd
gopls
golang-mvdan-gofumpt
rg
krita gimp inkscape
drawio-x86_64-30.0.4.rpm
bat
bc
btop
dua
unzip
unrar
sqlite
unzip
gitleaks
hyperfine
vesktop-1.6.5.x86_64.rpm
qdbus
loupe
chromium
stylua
caddy
pnpm
etckeeper
vicinae
cargo
python3-pip
nodejs
java-openjdk-headless java-25-openjdk-devel
filezilla
jq
kate
gh
libreoffice
yt-dlp mpv
xlsclients xwininfo
nodejs-bash-language-server
clangd
fuse-libs # For AppImages to work
openrgb
kdelibs-webkit
qdirstat
tokei

# Games
steam lutris Heroic-2.22.0-linux-x86_64.rpm
mangohud gamemode gamescope
r2modman-3.2.17.x86_64.rpm

# ZFS
@RAW https://zfsonlinux.org/fedora/zfs-release-3-1$(rpm --eval "%{dist}").noarch.rpm
@RAW kernel-devel-$(uname -r | awk -F'-' '{print $1}')
# NOTE: zfs must be after kernel was installed (as 2 separate k sync!!!!)
zfs

# For webzfs
libsodium-devel libffi-devel python3-devel

# For sanoid/syncoid
perl-Config-IniFiles perl-Data-Dumper perl-Capture-Tiny perl-Getopt-Long lzop mbuffer mhash pv

# For building aseprite from source
cmake ninja-build
libxcb-devel libX11-devel libXcursor-devel libXi-devel libXrandr-devel
libX11-devel libXext-devel libXcursor-devel libXi-devel libglvnd-devel fontconfig-devel pixman-devel

kopia kopia-ui

'''

[system.copr]
"scottames/ghostty" = {}
"yorickpeterse/stylua" = {}
"quadratech188/vicinae" = {}

