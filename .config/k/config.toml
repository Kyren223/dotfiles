[development]
rebuild_before_running = true
enable_rebuild_indicator = true

[workspace]
paths = ["$HOME/projects", "$HOME/personal", "$HOME/Documents", "$HOME/"]

[system]
rpms_path = "$HOME/rpms"
packages = '''
keepassxc
git
stow
delta
nix
dnf-command(versionlock)
zsh
oh-my-posh
keychain
fzf
zoxide
ghostty
eza
golang
gcc
clang
tmux
tree-sitter-cli
fastfetch
find
fd
gopls
golang-mvdan-gofumpt
rg
gimp
bat
bc
btop
dua
sqlite
unzip
gitleaks
hyperfine
vesktop-1.6.5.x86_64.rpm
qdbus
eog
loupe
nomacs
'''

[system.copr]
"scottames/ghostty" = {}

